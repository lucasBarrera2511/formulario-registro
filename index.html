<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Formulario de Registro</h1>
        
        <form id="registroForm">
            
            <fieldset>
                <legend>Datos de Cuenta</legend>
                
                <div class="form-group">
                    <label for="username">Nombre de Usuario *</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese su nombre de usuario">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme su contraseña">
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>
            </fieldset>

            <fieldset>
                <legend>Datos Personales</legend>
                
                <div class="form-group">
                    <label for="direccion">Dirección *</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Ingrese su dirección">
                    <span class="error-message" id="direccionError"></span>
                </div>

                <div class="form-group">
                    <label for="comuna">Comuna *</label>
                    <select id="comuna" name="comuna">
                        <option value="">Seleccione una comuna</option>
                        <option value="santiago">Santiago</option>
                        <option value="providencia">Providencia</option>
                        <option value="las-condes">Las Condes</option>
                        <option value="nunoa">Ñuñoa</option>
                        <option value="la-florida">La Florida</option>
                        <option value="maipu">Maipú</option>
                        <option value="puente-alto">Puente Alto</option>
                        <option value="san-bernardo">San Bernardo</option>
                        <option value="vitacura">Vitacura</option>
                        <option value="lo-barnechea">Lo Barnechea</option>
                    </select>
                    <span class="error-message" id="comunaError"></span>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono *</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678">
                    <span class="error-message" id="telefonoError"></span>
                </div>

                <div class="form-group">
                    <label for="webPersonal">Página Web Personal</label>
                    <input type="url" id="webPersonal" name="webPersonal" placeholder="https://www.ejemplo.com">
                    <span class="error-message" id="webError"></span>
                </div>
            </fieldset>

            <fieldset>
                <legend>Aficiones o Pasatiempos</legend>
                
                <div class="aficiones-container">
                    <div class="aficion-input-group">
                        <input type="text" id="aficionInput" placeholder="Ingrese una afición">
                        <button type="button" id="agregarAficion">Agregar Afición</button>
                    </div>
                    
                    <ul id="listaAficiones"></ul>
                    <span class="error-message" id="aficionesError"></span>
                </div>
            </fieldset>

            <div class="gato-section">
                <button type="button" id="btnVerGato" class="btn-gato">
                     Botón para ver un gato
                </button>
            </div>

            <div class="form-actions">
                <button type="submit" id="enviarBtn">Registrarse</button>
                <button type="button" id="limpiarBtn">Limpiar Formulario</button>
            </div>
            
        </form>
    </div>

    <div id="ventanaGato" class="ventana-gato">
        <div class="ventana-contenido">
            <span id="cerrarGato" class="cerrar">&times;</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/Gatos_leon.jpg" alt="Gato león">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
